# Source bundle for UC Model Migration.
#
# Public YAML — uses placeholder values. Override the variables and add your
# workspace target in databricks.local.yml (see databricks.local.yml.example).
#
# Deploy:  databricks bundle deploy -p <your-profile>
# Run:     databricks bundle run src_model_migration_cleanup -p <your-profile>
#          databricks bundle run src_model_export -p <your-profile>

bundle:
  name: uc-model-migration-src

include:
  - resources/*.yml
  - "*.local.yml"

variables:
  source_catalog:
    description: "Source UC catalog containing the registered models to migrate"
    default: "your_source_catalog"
  target_catalog:
    description: "Target UC catalog where models will be migrated to (recorded in the export manifest)"
    default: "your_target_catalog"
  source_schema:
    description: "Schema in source_catalog where the models live today"
    default: "your_source_schema"
  target_schema:
    description: "Schema in target_catalog where the models will be registered. May be the same as or different from source_schema."
    default: "your_target_schema"
  model_names:
    description: "Comma-separated list of model short names to migrate (e.g. 'churn_model,fraud_model')"
    default: "your_model_name"
  export_volume:
    description: "Name of the UC volume in source_catalog.source_schema used to stage exported artifacts"
    default: "model_exports"

targets:
  dev:
    default: true
